<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 | 网站暂时关闭</title>
    <meta name="description" content="网站暂时关闭，请稍后再试。">
    <meta name="color-scheme" content="light dark">
    <style>
        :root {
            color-scheme: light dark;
            --bg-start: #08111d;
            --bg-end: #132739;
            --card-bg: rgba(10, 19, 32, 0.82);
            --card-border: rgba(255, 255, 255, 0.1);
            --text: #f4f7fb;
            --muted: #a7b5c8;
            --primary: #6ee7d8;
            --primary-text: #0b1a22;
            --secondary-bg: rgba(255, 255, 255, 0.06);
            --secondary-border: rgba(255, 255, 255, 0.12);
            --shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-start: #f4f7fb;
                --bg-end: #e8eef6;
                --card-bg: rgba(255, 255, 255, 0.92);
                --card-border: rgba(15, 23, 42, 0.08);
                --text: #0f172a;
                --muted: #64748b;
                --primary: #0f172a;
                --primary-text: #ffffff;
                --secondary-bg: rgba(15, 23, 42, 0.04);
                --secondary-border: rgba(15, 23, 42, 0.1);
                --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
            }
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 231, 216, 0.12), transparent 28%),
                linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 52px 34px;
            text-align: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .code {
            margin: 0 0 12px;
            font-size: 4.5rem;
            line-height: 1;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.04em;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 1.8rem;
            font-weight: 600;
        }

        p {
            margin: 0 auto;
            max-width: 420px;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 28px;
        }

        .button {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid transparent;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .button:hover {
            transform: translateY(-1px);
            opacity: 0.96;
        }

        .button-primary {
            background: var(--primary);
            color: var(--primary-text);
        }

        .button-secondary {
            background: var(--secondary-bg);
            color: var(--text);
            border-color: var(--secondary-border);
        }

        @media (max-width: 640px) {
            .card {
                padding: 36px 22px;
                border-radius: 16px;
            }

            .code {
                font-size: 3.6rem;
            }

            h1 {
                font-size: 1.45rem;
            }

            .actions {
                flex-direction: column;
            }

            .button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="code">403</div>
        <h1>网站暂时关闭</h1>
        <p>请稍后再试</p>

        <div class="actions">
            <button class="button button-secondary" type="button" onclick="window.location.reload()">刷新页面</button>
        </div>
    </main>
</body>
</html>
